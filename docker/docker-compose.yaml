services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: split_postgres
    env_file:
      - ../packages/backend/.env
    environment:
      # Explicit mapping for PostgreSQL image (expects these exact names)
      POSTGRES_DB: ${POSTGRES_DB:-split_db}
      POSTGRES_USER: ${POSTGRES_USER:-split_pg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-split_pg_pswd}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ../packages/postgres/data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-split_pg_user} -d ${POSTGRES_DB:-split_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Shared memory for PostgreSQL performance
    shm_size: 256mb
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

